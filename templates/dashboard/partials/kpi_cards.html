<!-- KPI Metrics Row -->
<div class="grid-12">
    <!-- Active Backends (Featured Black Glossy Card) -->
    <div class="col-span-3 liquid-glass glass-black hover-lift" style="padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-sm);">
            <div>
                <p style="font-size: 13px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.7) !important;">Active Backends</p>
                <h3 class="number-display" id="metric-backends-count" style="font-size: 32px; margin-top: var(--space-xs); color: #FFFFFF !important;">9</h3>
            </div>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(0,168,150,0.2); display: flex; align-items: center; justify-content: center;">
                <span class="status-dot status-dot-active"></span>
            </div>
        </div>
        <p style="font-size: 13px; color: rgba(255,255,255,0.6) !important;">Online & Available</p>
    </div>

    <!-- Total Jobs (White Translucent Glass) -->
    <div class="col-span-3 liquid-glass hover-lift" style="padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-sm);">
            <div>
                <p style="font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary);">Total Jobs</p>
                <h3 class="number-display" id="metric-jobs-count" style="font-size: 32px; margin-top: var(--space-xs);">3</h3>
            </div>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(18,20,24,0.05); display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                <i class="fas fa-tasks"></i>
            </div>
        </div>
        <p style="font-size: 13px; color: var(--text-secondary);">All Time Jobs</p>
    </div>

    <!-- Running Jobs (White Translucent Glass) -->
    <div class="col-span-3 liquid-glass hover-lift" style="padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-sm);">
            <div>
                <p style="font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary);">Running Jobs</p>
                <h3 class="number-display" id="metric-running-count" style="font-size: 32px; margin-top: var(--space-xs);">0</h3>
            </div>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(18,20,24,0.05); display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                <i class="fas fa-spinner"></i>
            </div>
        </div>
        <p style="font-size: 13px; color: var(--text-secondary);">In Progress</p>
    </div>

    <!-- Success Rate (White Translucent Glass) -->
    <div class="col-span-3 liquid-glass hover-lift" style="padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-sm);">
            <div>
                <p style="font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary);">Success Rate</p>
                <h3 class="number-display" id="metric-success-rate" style="font-size: 32px; margin-top: var(--space-xs);">100%</h3>
            </div>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(0, 168, 150, 0.1); display: flex; align-items: center; justify-content: center; color: var(--accent-aqua);">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>
        <p style="font-size: 13px; color: var(--text-secondary);">Last 30 Days</p>
    </div>
</div>
