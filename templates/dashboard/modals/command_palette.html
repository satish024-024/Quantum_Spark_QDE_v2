<!-- Ctrl+K Command Palette Modal Overlay -->
<div id="command-palette" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 20, 24, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 10000; align-items: start; justify-content: center; padding-top: 120px;">
    <div class="liquid-glass" style="width: 100%; max-width: 600px; padding: 0; background: #FFFFFF; box-shadow: 0 30px 60px rgba(18, 20, 24, 0.15); border-radius: var(--radius-md);">
        <div style="display: flex; align-items: center; padding: 16px; border-bottom: 1px solid rgba(18, 20, 24, 0.08);">
            <i class="fas fa-search" style="font-size: 16px; color: var(--text-secondary); margin-right: 12px;"></i>
            <input type="text" id="command-palette-input" placeholder="Type a command or search..." style="flex: 1; border: none; background: transparent; outline: none; font-size: 16px; font-weight: 500; color: var(--text-primary); padding: 0;" autocomplete="off" />
            <span style="font-size: 11px; font-weight: 700; color: var(--text-secondary); border: 1.5px solid rgba(18, 20, 24, 0.1); border-radius: 4px; padding: 2px 6px; background: rgba(18, 20, 24, 0.03);">ESC</span>
        </div>

        <div id="command-palette-results" style="max-height: 380px; overflow-y: auto; padding: 8px 0;">
            <!-- Commands dynamically generated by command_palette.js -->
        </div>
    </div>
</div>

<script>
// Listen for Escape key to close Command Palette
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const palette = document.getElementById('command-palette');
        if (palette) palette.style.display = 'none';
    }
});
</script>
