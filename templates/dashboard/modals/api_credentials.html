<!-- IBM Quantum API Credentials Configuration Modal -->
<div id="api-config-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 20, 24, 0.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center;">
    <div class="liquid-glass" style="width: 100%; max-width: 480px; padding: var(--space-xl); background: #FFFFFF; box-shadow: 0 30px 60px rgba(18, 20, 24, 0.12);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); border-bottom: 1px solid rgba(18,20,24,0.06); padding-bottom: 12px;">
            <h3 style="font-size: 18px; font-weight: 600;">IBM Quantum API Config</h3>
            <button class="btn btn-ghost btn-icon" id="close-api-config" style="width: 32px; height: 32px;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="api-credentials-form" style="display: flex; flex-direction: column; gap: var(--space-md);">
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="api-token-input" style="font-size: 13px; font-weight: 700; color: var(--text-secondary);">IBM Quantum API Token</label>
                <input type="text" id="api-token-input" placeholder="Paste your API Token..." required />
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="crn-input" style="font-size: 13px; font-weight: 700; color: var(--text-secondary);">Instance CRN (Optional)</label>
                <input type="text" id="crn-input" placeholder="crn:v1:bluemix:public:..." />
            </div>

            <div style="display: flex; gap: 12px; margin-top: 8px; justify-content: flex-end;">
                <button type="button" class="btn btn-ghost" id="cancel-api-config">Cancel</button>
                <button type="submit" class="btn btn-accent">Save & Verify</button>
            </div>
        </form>
    </div>
</div>

<script>
// Bind modal close buttons
document.getElementById('close-api-config').addEventListener('click', () => {
    document.getElementById('api-config-modal').style.display = 'none';
});
document.getElementById('cancel-api-config').addEventListener('click', () => {
    document.getElementById('api-config-modal').style.display = 'none';
});
</script>
