<!-- Bloch Sphere Panel -->
<div class="panel-card liquid-glass widget" id="bloch-sphere-widget" data-widget="bloch-sphere">
    <div class="panel-header">
        <div class="panel-header-title">
            <i class="fas fa-globe" style="color: var(--accent-aqua);"></i>
            <h4>3D Bloch Sphere</h4>
        </div>
        <div class="panel-header-actions">
            <button class="btn btn-ghost" id="open-bloch-simulator" onclick="window.location.href='/static/bloch-sphere-simulator/index.html'" style="padding: 4px 10px; font-size: 11px;">Simulator</button>
        </div>
    </div>
    
    <div class="panel-body" style="height: 340px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;" id="bloch-content">
        <!-- Loading element targeted by widgets.js -->
        <div id="bloch-loading" style="display: none; padding: 24px; text-align: center;">
            <i class="fas fa-spinner fa-spin"></i> Initializing Vector Mapping...
        </div>

        <!-- Canvas container targeted by Three.js / widgets.js -->
        <div id="bloch-3d-container" style="width: 100%; height: 260px; position: relative; display: flex; align-items: center; justify-content: center;">
            <!-- Canvas will be injected here -->
        </div>

        <div style="display: flex; gap: 8px; font-size: 12px; color: var(--text-secondary); width: 100%; justify-content: space-between; border-top: 1px solid rgba(18,20,24,0.06); padding-top: 12px;">
            <div>State: <span id="bloch-state-text" style="font-weight: 700; color: var(--text-primary);">|0⟩</span></div>
            <div>Theta: <span id="bloch-theta-val">0°</span> | Phi: <span id="bloch-phi-val">0°</span></div>
        </div>
    </div>
</div>
