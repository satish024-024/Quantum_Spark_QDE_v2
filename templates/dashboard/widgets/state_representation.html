<!-- State Representation Panel -->
<div class="panel-card liquid-glass widget" id="state-representation-widget" data-widget="quantum-state">
    <div class="panel-header">
        <div class="panel-header-title">
            <i class="fas fa-atom" style="color: var(--accent-aqua);"></i>
            <h4>Quantum State</h4>
        </div>
        <div class="panel-header-actions">
            <select id="state-representation-type" style="padding: 2px 6px; font-size: 11px;">
                <option value="state_vector">State Vector</option>
                <option value="density_matrix">Density Matrix</option>
            </select>
        </div>
    </div>
    <div class="panel-body" style="height: 340px; overflow-y: auto;" id="quantum-state-content">
        <div id="state-loaded-status" style="font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; color: var(--text-secondary);">
            Awaiting Measurement Results
        </div>
        <div id="state-amplitudes-list" style="display: flex; flex-direction: column; gap: 8px; font-family: var(--font-mono); font-size: 13px;">
            <!-- Amplitudes list injected dynamically -->
            <div style="padding: 12px; text-align: center; color: var(--text-secondary);">No Quantum State Loaded</div>
        </div>
    </div>
</div>
