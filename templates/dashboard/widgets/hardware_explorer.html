<!-- Hardware Explorer Widget -->
<div class="panel-card liquid-glass widget" id="backends-widget" data-widget="backends">
    <div class="panel-header">
        <div class="panel-header-title">
            <i class="fas fa-server" style="color: var(--accent-aqua);"></i>
            <h4>Hardware Explorer</h4>
        </div>
        <div class="panel-header-actions">
            <button class="btn btn-ghost" id="open-backends-details-btn" onclick="window.quantumWidgets.showDetailedBackendsModal()" style="padding: 6px 12px; font-size: 12px;">View All</button>
        </div>
    </div>
    <div class="panel-body" style="height: 320px; overflow-y: auto;" id="backends-content">
        <!-- Injected dynamically by widgets.js -->
        <div style="padding: 32px; text-align: center;">
            <div class="shimmer-placeholder" style="height: 48px; margin-bottom: 12px;"></div>
            <div class="shimmer-placeholder" style="height: 48px; margin-bottom: 12px;"></div>
            <div class="shimmer-placeholder" style="height: 48px;"></div>
        </div>
    </div>
    <div class="panel-footer">
        <button class="btn btn-ghost" style="padding: 4px 10px; font-size: 11px;" id="explain-backends-ai">
            <i class="fas fa-sparkles" style="color: var(--accent-aqua);"></i> Explain Hardware
        </button>
    </div>
</div>
