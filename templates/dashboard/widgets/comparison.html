<!-- Backend Comparison Panel -->
<div class="panel-card liquid-glass" id="comparison-widget" style="grid-column: span 8;">
    <div class="panel-header">
        <div class="panel-header-title">
            <i class="fas fa-balance-scale" style="color: var(--accent-aqua);"></i>
            <h4>Backend Comparison</h4>
        </div>
        <div class="panel-header-actions" style="display: flex; gap: 8px;">
            <button class="btn btn-ghost" id="add-compare-backend" style="padding: 4px 10px; font-size: 11px;">+ Add Backend</button>
            <select id="compare-backend-1" style="padding: 2px 6px; font-size: 11px;"></select>
            <select id="compare-backend-2" style="padding: 2px 6px; font-size: 11px;"></select>
            <button class="btn btn-accent" id="trigger-compare-btn" style="padding: 4px 12px; font-size: 11px;">Compare</button>
        </div>
    </div>
    <div class="panel-body" style="height: 320px; overflow-y: auto; padding: 0;">
        <table id="comparison-table">
            <thead>
                <tr>
                    <th>Metric</th>
                    <th id="compare-name-1">Backend 1</th>
                    <th id="compare-name-2">Backend 2</th>
                </tr>
            </thead>
            <tbody id="comparison-tbody">
                <!-- Comparison rows injected dynamically -->
                <tr>
                    <td>Qubit Count</td>
                    <td id="comp-qubits-1">-</td>
                    <td id="comp-qubits-2">-</td>
                </tr>
                <tr>
                    <td>Queue Length</td>
                    <td id="comp-queue-1">-</td>
                    <td id="comp-queue-2">-</td>
                </tr>
                <tr>
                    <td>Fidelity (1Q Error)</td>
                    <td id="comp-fidelity-1">-</td>
                    <td id="comp-fidelity-2">-</td>
                </tr>
                <tr>
                    <td>Fidelity (2Q Error)</td>
                    <td id="comp-fidelity-2q-1">-</td>
                    <td id="comp-fidelity-2q-2">-</td>
                </tr>
                <tr>
                    <td>Readout Error</td>
                    <td id="comp-readout-1">-</td>
                    <td id="comp-readout-2">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
